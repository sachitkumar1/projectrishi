name: LMS Reminders

"on":
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Call reminder endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --silent --show-error --fail \
            -X POST \
            "$SITE_URL/api/lms/cron/reminders" \
            -H "Authorization: Bearer $CRON_SECRET"