name: LMS Reminders

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Call reminder endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -X POST             "$SITE_URL/api/lms/cron/reminders"             -H "Authorization: Bearer $CRON_SECRET"
